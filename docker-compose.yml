x-common-env: &common-env
  APP_NAME: ${APP_NAME:-jg-sinaptor}
  ENVIRONMENT: ${ENVIRONMENT:-dev}
  TZ: America/Argentina/Buenos_Aires

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "${BACKEND_PORT:-9052}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      <<: *common-env
      NODE_ENV: development
      PORT: 3000
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB:-jg_sinaptor}
      MONGO_USER: ${MONGO_USER:-sinaptor}
      MONGO_PASS: ${MONGO_PASS:-sinaptor123}
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPICS: ${KAFKA_TOPICS:-botellas-events,tunnels-events,dlq-events}
      GATEWAY_WS_URL: ${GATEWAY_WS_URL:-}
      ETER_INTERNAL_SECRET: ${ETER_INTERNAL_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000/api || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "${MONGODB_PORT:-9056}:27017"
    volumes:
      - ./data/mongodb:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-sinaptor}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-sinaptor123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-jg_sinaptor}
    healthcheck:
      test: mongosh --eval 'db.runCommand("ping").ok' --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "${KAFKA_PORT:-9058}:9094"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://host.docker.internal:${KAFKA_PORT:-9058}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: ${CLUSTER_ID:-jg-sinaptor-cluster-001}
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_PORT:-9050}:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      <<: *common-env
    restart: unless-stopped

  akhq:
    image: tchiotludo/akhq:0.24.0
    ports:
      - "${AKHQ_PORT:-9053}:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            jg-sinaptor:
              properties:
                bootstrap.servers: "kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: ${APP_NAME:-jg-sinaptor}-${ENVIRONMENT:-dev}-network
